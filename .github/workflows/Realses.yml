name: Create Release
needs: create-package
if: startsWith(github.ref, 'refs/tags/')
runs-on: ubuntu-latest
steps:
  - name: دریافت پکیج
    uses: actions/download-artifact@v4
    with:
      name: ImanAccounting-Package-v${{ github.event.inputs.version }}
      path: ./release
  
  - name: ایجاد Release
    uses: softprops/action-gh-release@v1
    with:
      files: release/*.zip
      name: ایمان حسابداری نسخه ${{ github.ref_name }}
      body: |
        🎉 نسخه جدید منتشر شد!
        
        📥 فایل‌ها:
        - ImanAccounting_x64.exe (ویندوز ۶۴ بیت)
        - ImanAccounting_x86.exe (ویندوز ۳۲ بیت)
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
