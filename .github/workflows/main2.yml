name: Build ImanAccounting (x64 & x86)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'نسخه برنامه'
        required: false
        default: '8.0.0'

jobs:
  build-x64:
    name: 🏗️ ساخت نسخه ۶۴ بیت
    runs-on: windows-latest
    steps:
      - name: 📥 دریافت کد منبع
        uses: actions/checkout@v4
      
      - name: 🔧 نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📦 نصب کتابخانه‌ها
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install pyqt5 pyqt5-tools pyqt5-sip
          pip install pycryptodome
          echo "✅ کتابخانه‌ها نصب شدند"
      
      - name: 🔨 ساخت EXE (۶۴ بیت)
        run: |
          pyinstaller --onefile `
            --windowed `
            --name="ImanAccounting_x64" `
            --add-data="plugins;plugins" `
            Latestversion3.py
          
          echo "✅ نسخه ۶۴ بیت ساخته شد"
      
      - name: 📤 آپلود نسخه ۶۴ بیت
        uses: actions/upload-artifact@v4
        with:
          name: ImanAccounting-x64
          path: dist/ImanAccounting_x64.exe

  build-x86:
    name: 🏗️ ساخت نسخه ۳۲ بیت
    runs-on: windows-latest
    steps:
      - name: 📥 دریافت کد منبع
        uses: actions/checkout@v4
      
      - name: 🔧 نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📦 نصب کتابخانه‌ها
        run: |
          pip install pyinstaller pyqt5 pyqt5-tools pycryptodome
      
      - name: 🔨 ساخت EXE (۳۲ بیت)
        run: |
          pyinstaller --onefile `
            --windowed `
            --name="ImanAccounting_x86" `
            --target-arch=32bit `
            Latestversion3.py
          
          echo "✅ نسخه ۳۲ بیت ساخته شد"
      
      - name: 📤 آپلود نسخه ۳۲ بیت
        uses: actions/upload-artifact@v4
        with:
          name: ImanAccounting-x86
          path: dist/ImanAccounting_x86.exe

  create-package:
    name: 📦 ایجاد پکیج نهایی
    needs: [build-x64, build-x86]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 دریافت نسخه ۶۴ بیت
        uses: actions/download-artifact@v4
        with:
          name: ImanAccounting-x64
          path: ./package
      
      - name: 📥 دریافت نسخه ۳۲ بیت
        uses: actions/download-artifact@v4
        with:
          name: ImanAccounting-x86
          path: ./package
      
      - name: 📦 ایجاد پکیج نهایی
        run: |
          mkdir -p ImanAccounting-Package
          cp package/*.exe ImanAccounting-Package/
          
          # ایجاد فایل README
          cat > ImanAccounting-Package/README.txt << 'EOF'
          ایمان حسابداری - ImanAccounting
          نسخه 8.0.0
          
          📋 راهنمای نصب:
          ------------------------
          1️⃣ ویندوز ۶۴ بیت: ImanAccounting_x64.exe
          2️⃣ ویندوز ۳۲ بیت: ImanAccounting_x86.exe
          
          🤖 قابلیت‌ها:
          - هوش مصنوعی داخلی
          - پیش‌بینی هزینه
          - تشخیص تراکنش مشکوک
          - تم آبی مشکی
          
          📞 پشتیبانی: @ImanAI2026
          EOF
          
          cd ImanAccounting-Package
          zip -r ../ImanAccounting.zip *
      
      - name: 📤 آپلود پکیج نهایی
        uses: actions/upload-artifact@v4
        with:
          name: ImanAccounting-Package
          path: ImanAccounting.zip
