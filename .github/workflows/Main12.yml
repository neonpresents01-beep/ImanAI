name: Build ImanAccounting EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'نسخه برنامه (مثال: 7.2.0)'
        required: false
        default: '7.2.0'

jobs:
  build-windows:
    name: 🏗️ ساخت EXE ویندوز
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read
    
    steps:
      - name: 📥 دریافت کد منبع
        uses: actions/checkout@v4
      
      - name: 🔧 نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: 📦 نصب کتابخانه‌های مورد نیاز
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install pyqt5 pyqt5-tools pyqt5-sip
          pip install pycryptodome requests
      
      - name: 🖼️ بررسی وجود آیکون
        id: check-icon
        shell: pwsh
        run: |
          if (Test-Path "iman.ico") {
            echo "✅ آیکون پیدا شد"
            echo "has_icon=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "⚠️ آیکون پیدا نشد، از آیکون پیش‌فرض استفاده می‌شود"
            echo "has_icon=false" >> $env:GITHUB_OUTPUT
          }
      
      - name: 🎨 ایجاد آیکون پیش‌فرض (اگه نباشه)
        if: steps.check-icon.outputs.has_icon == 'false'
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $bmp = New-Object System.Drawing.Bitmap(256, 256)
          $graphics = [System.Drawing.Graphics]::FromImage($bmp)
          $graphics.Clear([System.Drawing.Color]::FromArgb(255, 52, 73, 94))
          $font = New-Object System.Drawing.Font("Arial", 80, [System.Drawing.FontStyle]::Bold)
          $brush = [System.Drawing.Brushes]::White
          $graphics.DrawString("IM", $font, $brush, 40, 70)
          $graphics.DrawString("AN", $font, $brush, 40, 150)
          $graphics.Dispose()
          $bmp.Save("iman.ico", [System.Drawing.Imaging.ImageFormat]::Icon)
          echo "✅ آیکون پیش‌فرض ساخته شد"
      
      - name: 🔨 ساخت EXE با PyInstaller
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ($version -eq "") { $version = "7.2.0" }
          
          pyinstaller --onefile `
            --windowed `
            --name="ImanAccounting" `
            --icon="iman.ico" `
            --add-data="plugins;plugins" `
            --hidden-import=PyQt5.sip `
            --hidden-import=Crypto `
            --hidden-import=Crypto.Cipher `
            --hidden-import=Crypto.Util.Padding `
            --version-file=version_info.txt `
            ImanAccounting.py
      
      - name: 📄 ایجاد فایل اطلاعات نسخه
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ($version -eq "") { $version = "7.2.0" }
          
          @"
          # UTF-8
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=($version -replace '\.', ', '),
              prodvers=($version -replace '\.', ', '),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0, 0)
            ),
            kids=[
              StringFileInfo(
                [
                  StringTable(
                    u'040904B0',
                    [StringStruct(u'CompanyName', u'ایمان حسابداری'),
                     StringStruct(u'FileDescription', u'نرم‌افزار حسابداری حرفه‌ای'),
                     StringStruct(u'FileVersion', u'$version'),
                     StringStruct(u'InternalName', u'ImanAccounting'),
                     StringStruct(u'LegalCopyright', u'© 2024 ایمان'),
                     StringStruct(u'OriginalFilename', u'ImanAccounting.exe'),
                     StringStruct(u'ProductName', u'ایمان حسابداری'),
                     StringStruct(u'ProductVersion', u'$version')])
                ]),
              VarFileInfo([VarStruct(u'Translation', [1033, 1200])])
            ]
          )
          "@ | Out-File -FilePath version_info.txt -Encoding utf8
      
      - name: 📦 ایجاد پکیج کامل
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ($version -eq "") { $version = "7.2.0" }
          
          New-Item -ItemType Directory -Path package -Force
          
          # کپی فایل اصلی
          Copy-Item dist/ImanAccounting.exe package/
          
          # کپی آیکون
          Copy-Item iman.ico package/ -ErrorAction SilentlyContinue
          
          # کپی پوشه پلاگین (اگه هست)
          if (Test-Path "plugins") {
            Copy-Item -Recurse plugins package/
          }
          
          # کپی لایسنس نمونه (اگه هست)
          if (Test-Path "school.lic") {
            Copy-Item school.lic package/
          }
          if (Test-Path "admin.lic") {
            Copy-Item admin.lic package/
          }
          
          # ایجاد فایل README
          @"
          # ایمان حسابداری v$version
          
          ## 📋 راهنمای سریع
          1. فایل ImanAccounting.exe را اجرا کنید
          2. نیازی به نصب نیست
          
          ## 🔑 انواع لایسنس
          - `school.lic` : نسخه مخصوص مدرسه (بدون محدودیت)
          - `admin.lic` : نسخه ادمین (مخصوص توسعه‌دهنده)
          - `pro.lic` : نسخه حرفه‌ای (یک ساله)
          - `trial.lic` : نسخه آزمایشی (۳۰ روز)
          
          ## 📞 پشتیبانی
          - ایمیل: neonpresents01@gmail.com
          - وبسایت: https://neonpresents01-beep.github.io/ImanAI/
          
          © 2024 ایمان
          "@ | Out-File -FilePath package/README.txt -Encoding utf8
          
          # ایجاد فایل ZIP
          Compress-Archive -Path package/* -DestinationPath "ImanAccounting-v$version.zip"
      
      - name: 📤 آپلود EXE
        uses: actions/upload-artifact@v4
        with:
          name: ImanAccounting-EXE
          path: dist/ImanAccounting.exe
      
      - name: 📤 آپلود پکیج کامل
        uses: actions/upload-artifact@v4
        with:
          name: ImanAccounting-Package
          path: ImanAccounting-*.zip
      
      - name: 📝 نمایش نتیجه
        shell: pwsh
        run: |
          Write-Host "✅ ساخت EXE با موفقیت انجام شد!" -ForegroundColor Green
          Write-Host "📁 فایل‌های خروجی:" -ForegroundColor Cyan
          Get-ChildItem -Path dist -Recurse
          
          $file = Get-Item "dist/ImanAccounting.exe"
          $size = [math]::Round($file.Length / 1MB, 2)
          Write-Host "📊 حجم فایل: $size مگابایت" -ForegroundColor Yellow
