name: Build ImanAccounting EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'نسخه برنامه'
        required: false
        default: '7.4.0'

jobs:
  build-windows:
    name: 🏗️ ساخت EXE ویندوز
    runs-on: windows-latest
    
    steps:
      - name: 📥 دریافت کد منبع
        uses: actions/checkout@v4
      
      - name: 🔧 نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📦 نصب کتابخانه‌های مورد نیاز
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install pyqt5 pyqt5-tools pyqt5-sip
          pip install pycryptodome requests
          pip install pillow
          echo "✅ کتابخانه‌ها نصب شدند"
      
      - name: 🎨 ایجاد آیکون ساده
        shell: pwsh
        run: |
          # ایجاد یک آیکون ساده با PowerShell
          Add-Type -AssemblyName System.Drawing
          
          # ایجاد تصویر 256x256
          $bmp = New-Object System.Drawing.Bitmap(256, 256)
          $graphics = [System.Drawing.Graphics]::FromImage($bmp)
          
          # پس‌زمینه آبی تیره
          $graphics.Clear([System.Drawing.Color]::FromArgb(255, 52, 73, 94))
          
          # نوشتن IMAN با فونت بزرگ
          $font = New-Object System.Drawing.Font("Arial", 60, [System.Drawing.FontStyle]::Bold)
          $brush = [System.Drawing.Brushes]::White
          
          # نوشتن I
          $graphics.DrawString("I", $font, $brush, 50, 50)
          # نوشتن M
          $graphics.DrawString("M", $font, $brush, 120, 50)
          # نوشتن A
          $graphics.DrawString("A", $font, $brush, 50, 130)
          # نوشتن N
          $graphics.DrawString("N", $font, $brush, 120, 130)
          
          # نماد حسابدار
          $font2 = New-Object System.Drawing.Font("Segoe UI", 40)
          $graphics.DrawString("💰", $font2, $brush, 170, 180)
          
          $graphics.Dispose()
          
          # ذخیره به صورت ICO
          $bmp.Save("iman.ico", [System.Drawing.Imaging.ImageFormat]::Icon)
          
          echo "✅ آیکون با حروف IMAN ساخته شد"
      
      - name: 📄 ایجاد فایل اطلاعات نسخه
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ($version -eq "") { $version = "7.4.0" }
          
          @"
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=($version -replace '\.', ', '),
              prodvers=($version -replace '\.', ', '),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0, 0)
            ),
            kids=[
              StringFileInfo(
                [
                  StringTable(
                    u'040904B0',
                    [StringStruct(u'CompanyName', u'ایمان حسابداری'),
                     StringStruct(u'FileDescription', u'نرم‌افزار حسابداری حرفه‌ای'),
                     StringStruct(u'FileVersion', u'$version'),
                     StringStruct(u'InternalName', u'ImanAccounting'),
                     StringStruct(u'LegalCopyright', u'© ۱۴۰۳ ایمان'),
                     StringStruct(u'OriginalFilename', u'ImanAccounting.exe'),
                     StringStruct(u'ProductName', u'ایمان حسابداری'),
                     StringStruct(u'ProductVersion', u'$version')])
                ]),
              VarFileInfo([VarStruct(u'Translation', [1033, 1200])])
            ]
          )
          "@ | Out-File -FilePath version_info.txt -Encoding utf8
          
          echo "✅ فایل version_info.txt با نسخه $version ایجاد شد"
      
      - name: 🔨 ساخت EXE با PyInstaller (بدون آیکون)
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ($version -eq "") { $version = "7.4.0" }
          
          # ساخت دستور پایه (بدون آیکون)
          $cmd = "pyinstaller --onefile --windowed --name=`"ImanAccounting`" --version-file=`"version_info.txt`""
          
          # اضافه کردن پوشه plugins اگه وجود داشته باشه
          if (Test-Path "plugins") {
            $cmd += " --add-data=`"plugins;plugins`""
            Write-Host "📦 پوشه plugins پیدا شد"
          }
          
          # اضافه کردن hidden imports
          $cmd += " --hidden-import=PyQt5.sip"
          $cmd += " --hidden-import=Crypto"
          $cmd += " --hidden-import=Crypto.Cipher"
          $cmd += " --hidden-import=Crypto.Util.Padding"
          
          # اضافه کردن فایل اصلی
          $cmd += " Latestversion3.py"
          
          Write-Host "🚀 اجرای دستور: $cmd" -ForegroundColor Cyan
          Invoke-Expression $cmd
          
          if ($LASTEXITCODE -eq 0) {
            echo "✅ EXE با موفقیت ساخته شد"
          } else {
            echo "❌ خطا در ساخت EXE"
            exit 1
          }
      
      - name: 📦 ایجاد پکیج کامل
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ($version -eq "") { $version = "7.4.0" }
          
          New-Item -ItemType Directory -Path package -Force
          
          # کپی فایل اصلی
          Copy-Item dist/ImanAccounting.exe package/
          
          # کپی آیکون (اگه ساخته شده)
          if (Test-Path "iman.ico") {
            Copy-Item iman.ico package/
          }
          
          # کپی فایل نسخه
          Copy-Item version_info.txt package/ -ErrorAction SilentlyContinue
          
          # کپی پوشه پلاگین (اگه هست)
          if (Test-Path "plugins") {
            Copy-Item -Recurse plugins package/
            $plugin_count = (Get-ChildItem -Path plugins -Filter *.py).Count
            Write-Host "✅ $plugin_count پلاگین کپی شد"
          }
          
          # ایجاد فایل README
          @"
          # ایمان حسابداری - ImanAccounting
          نسخه $version
          
          ## 📋 راهنمای سریع
          1. فایل ImanAccounting.exe را اجرا کنید
          2. نیازی به نصب نیست
          
          ## 🔑 انواع لایسنس
          - `school.lic` : نسخه مخصوص مدرسه
          - `admin.lic` : نسخه ادمین
          - `pro.lic` : نسخه حرفه‌ای
          
          ## 📦 پلاگین‌ها
          برای اضافه کردن پلاگین، فایل‌های .py را در پوشه `plugins` قرار دهید.
          
          ## 📞 پشتیبانی
          - ایمیل: neonpresents01@gmail.com
          - وبسایت: https://neonpresents01-beep.github.io/ImanAI/
          
          © ۱۴۰۳ ایمان
          "@ | Out-File -FilePath package/README.txt -Encoding utf8
          
          # ایجاد فایل ZIP
          Compress-Archive -Path package/* -DestinationPath "ImanAccounting-v$version.zip" -Force
          
          Write-Host "✅ پکیج نهایی ساخته شد: ImanAccounting-v$version.zip" -ForegroundColor Green
      
      - name: 📤 آپلود EXE
        uses: actions/upload-artifact@v4
        with:
          name: ImanAccounting-v${{ github.event.inputs.version }}
          path: dist/ImanAccounting.exe
          if-no-files-found: error
      
      - name: 📤 آپلود پکیج کامل
        uses: actions/upload-artifact@v4
        with:
          name: ImanAccounting-Package-v${{ github.event.inputs.version }}
          path: ImanAccounting-*.zip
          if-no-files-found: error
      
      - name: 📊 نمایش خلاصه
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ($version -eq "") { $version = "7.4.0" }
          
          Write-Host "🎉 ساخت با موفقیت انجام شد!" -ForegroundColor Green
          Write-Host "=" * 50 -ForegroundColor Cyan
          Write-Host "📦 نام فایل: ImanAccounting.exe" -ForegroundColor Yellow
          Write-Host "📌 نسخه: $version" -ForegroundColor Yellow
          
          $file = Get-Item "dist/ImanAccounting.exe" -ErrorAction SilentlyContinue
          if ($file) {
            $size = [math]::Round($file.Length / 1MB, 2)
            Write-Host "📊 حجم فایل: $size مگابایت" -ForegroundColor Yellow
          }
          
          if (Test-Path "plugins") {
            $count = (Get-ChildItem -Path plugins -Filter *.py).Count
            Write-Host "📦 تعداد پلاگین‌ها: $count" -ForegroundColor Yellow
          }
          
          Write-Host "=" * 50 -ForegroundColor Cyan
          Write-Host "📥 فایل‌ها از بخش Artifacts قابل دانلود هستند" -ForegroundColor Green
