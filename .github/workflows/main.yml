name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: نصب کتابخانه
        run: pip install pyinstaller pyqt5 pycryptodome
      
      - name: ساخت EXE
        run: pyinstaller --onefile --name="ImanAccounting" Latestversion3.py
      
      - uses: actions/upload-artifact@v4
        with:
          name: ImanAccounting
          path: dist/ImanAccounting.exe
